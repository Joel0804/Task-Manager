<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Create account</h1>
      <p>Start tracking your tasks</p>

      <div id="error-msg" class="error-msg"></div>
      <div id="success-msg" class="success-msg"></div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Pick a username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 6 characters">
      </div>

      <button class="btn btn-primary" id="register-btn">Create Account</button>

      <p class="auth-switch">Already have an account? <a href="/login">Log in</a></p>
    </div>
  </div>

  <script>
    document.getElementById("register-btn").addEventListener("click", async () => {
      const username = document.getElementById("username").value
      const password = document.getElementById("password").value
      const errorEl = document.getElementById("error-msg")
      const successEl = document.getElementById("success-msg")

      errorEl.style.display = "none"
      successEl.style.display = "none"

      const response = await fetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      })

      const data = await response.json()

      if (response.ok) {
        successEl.textContent = "Account created! Redirecting to login..."
        successEl.style.display = "block"
        setTimeout(() => window.location.href = "/login", 1500)
      } else {
        errorEl.textContent = data.error
        errorEl.style.display = "block"
      }
    })
  </script>
</body>
</html>
